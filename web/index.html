<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyInvest 信息总览</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">MyInvest 20260618</p>
        <h1>信息总览</h1>
      </div>
      <div class="topbar-actions">
        <span class="sync-time" id="global-status">等待刷新</span>
        <button class="icon-button primary" id="refresh-all" type="button" aria-label="全部刷新" title="全部刷新">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 0 1-15.4 6.4L3 16" />
            <path d="M3 21v-5h5" />
            <path d="M3 12A9 9 0 0 1 18.4 5.6L21 8" />
            <path d="M21 3v5h-5" />
          </svg>
        </button>
      </div>
    </header>

    <main>
      <nav class="entry-grid" id="entry-grid" aria-label="主页入口"></nav>
      <section class="workspace" id="workspace" aria-live="polite"></section>
    </main>

    <template id="entry-template">
      <button class="entry-card" type="button">
        <span class="entry-accent"></span>
        <span class="entry-main">
          <span class="entry-label"></span>
          <span class="entry-subtitle"></span>
        </span>
        <span class="entry-meta"></span>
      </button>
    </template>

    <template id="panel-template">
      <article class="data-panel">
        <header class="panel-head">
          <div>
            <p class="panel-kicker"></p>
            <h2></h2>
          </div>
          <div class="panel-actions">
            <a class="icon-button ghost source-link" href="#" aria-label="打开原始接口" title="打开原始接口">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M15 3h6v6" />
                <path d="M10 14 21 3" />
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              </svg>
            </a>
            <button class="icon-button ghost refresh-one" type="button" aria-label="刷新" title="刷新">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M21 12a9 9 0 0 1-9 9 9.8 9.8 0 0 1-6.7-2.7L3 16" />
                <path d="M3 21v-5h5" />
                <path d="M3 12a9 9 0 0 1 9-9 9.8 9.8 0 0 1 6.7 2.7L21 8" />
                <path d="M21 3v5h-5" />
              </svg>
            </button>
          </div>
        </header>
        <div class="panel-state"></div>
        <div class="metric-grid"></div>
        <div class="table-wrap"></div>
        <details class="raw-block">
          <summary>原始 JSON</summary>
          <pre></pre>
        </details>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
